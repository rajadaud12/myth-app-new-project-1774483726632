name: MYTH Build System

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "apk or web"
        required: true
        default: "apk"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
      - name: Initialize / Repair Project
        run: |
          # Backup current work
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Generate missing infrastructure (web, android)
          flutter create . --platforms=web,android --project-name=app --overwrite
          
          # Restore user code
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          
          flutter pub get

      - name: Build
        run: |
          # Default to web if empty or web
          TARGET="${{ github.event.inputs.build_type }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          
          if [ "$TARGET" == "web" ]; then
            flutter build web --release
          else
            flutter build apk --release
          fi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/web
            build/app/outputs/flutter-apk/app-release.apk
      - name: Deploy to GitHub Pages
        if: github.event.inputs.build_type == 'web'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web